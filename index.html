<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ofertas ML — Canal WhatsApp</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f0;
  --white: #ffffff;
  --ink: #111111;
  --muted: #888;
  --border: #e0e0d8;
  --yellow: #FFE135;
  --orange: #FF5722;
  --green-wa: #25D366;
  --green-dark: #128C7E;
  --red: #E53935;
  --blue: #1565C0;
  --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--ink);
  color: #fff;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 20;
}

.logo-box {
  background: var(--yellow);
  color: var(--ink);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 1px;
  padding: 4px 10px;
  border-radius: 6px;
  line-height: 1;
}

header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 1.5px;
  line-height: 1;
}

header p {
  font-size: 11px;
  color: #aaa;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

.live-dot {
  width: 8px;
  height: 8px;
  background: var(--green-wa);
  border-radius: 50%;
  animation: blink 1.6s infinite;
}

@keyframes blink {
  0%,100% { opacity:1; }
  50% { opacity:0.2; }
}

.live-label {
  font-size: 11px;
  color: var(--green-wa);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── CATS ── */
.cats {
  background: var(--ink);
  padding: 0 16px 14px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.cats::-webkit-scrollbar { display: none; }

.cat {
  padding: 7px 16px;
  border-radius: 30px;
  border: 1.5px solid #333;
  background: transparent;
  color: #aaa;
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}

.cat.active {
  background: var(--yellow);
  border-color: var(--yellow);
  color: var(--ink);
}

/* ── SEARCH ── */
.search-wrap {
  padding: 14px 16px;
  display: flex;
  gap: 10px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
}

.search-wrap input {
  flex: 1;
  padding: 11px 16px;
  border-radius: 10px;
  border: 2px solid var(--border);
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 600;
  outline: none;
  transition: border-color 0.2s;
  background: var(--bg);
}

.search-wrap input:focus { border-color: var(--ink); }
.search-wrap input::placeholder { color: #bbb; font-weight: 600; }

.btn-search {
  background: var(--ink);
  color: var(--yellow);
  border: none;
  padding: 11px 20px;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.btn-search:hover { opacity: 0.85; }
.btn-search:disabled { opacity: 0.4; }

/* ── STATUS ── */
.status {
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── GRID ── */
.grid {
  padding: 6px 16px 100px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── CARD ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  overflow: hidden;
  animation: slideUp 0.3s ease both;
  border: 1.5px solid transparent;
  transition: border-color 0.2s, transform 0.15s;
}

.card:hover { border-color: var(--yellow); transform: translateY(-1px); }

@keyframes slideUp {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}

.card-body {
  display: flex;
  gap: 12px;
  padding: 14px;
}

.thumb-wrap {
  position: relative;
  flex-shrink: 0;
}

.thumb {
  width: 88px;
  height: 88px;
  object-fit: contain;
  border-radius: 10px;
  background: var(--bg);
  display: block;
}

.badge-off {
  position: absolute;
  top: -4px;
  left: -4px;
  background: var(--red);
  color: #fff;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  padding: 1px 7px;
  border-radius: 6px;
  line-height: 1.4;
  letter-spacing: 0.5px;
}

.info { flex: 1; min-width: 0; }

.product-name {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  color: var(--ink);
}

.price-now {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  color: var(--ink);
  line-height: 1;
}

.price-before {
  font-size: 12px;
  color: var(--muted);
  text-decoration: line-through;
  font-weight: 600;
  margin-left: 4px;
}

.meta {
  margin-top: 4px;
  font-size: 11px;
  color: var(--muted);
  font-weight: 700;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.tag {
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

.tag-hot {
  background: #FFF3E0;
  color: var(--orange);
  border-color: var(--orange);
}

/* ── MESSAGE SECTION ── */
.msg-section {
  border-top: 1.5px dashed var(--border);
  margin: 0 14px;
}

.msg-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0 8px;
  cursor: pointer;
}

.msg-header-left {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 800;
  color: var(--green-dark);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.wa-icon {
  width: 20px;
  height: 20px;
  background: var(--green-wa);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
}

.chevron {
  font-size: 12px;
  color: var(--muted);
  transition: transform 0.2s;
}

.chevron.open { transform: rotate(180deg); }

.msg-box {
  display: none;
  background: #ECF8EF;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 12px;
  font-size: 13px;
  line-height: 1.75;
  color: #1a1a1a;
  white-space: pre-wrap;
  font-family: 'Nunito', sans-serif;
  border-left: 3px solid var(--green-wa);
  word-break: break-word;
}

.msg-box.open { display: block; }

/* ── ACTIONS ── */
.actions {
  display: flex;
  gap: 8px;
  padding: 0 14px 14px;
  flex-wrap: wrap;
}

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.btn-wa {
  background: var(--green-wa);
  color: #fff;
  flex: 1;
}
.btn-wa:hover { background: #20ba5a; }
.btn-wa.copied { background: var(--green-dark); }

.btn-ver {
  background: var(--bg);
  color: var(--ink);
  border: 1.5px solid var(--border);
}
.btn-ver:hover { border-color: var(--ink); }

.btn-ml {
  background: #3483FA;
  color: #fff;
  text-decoration: none;
}
.btn-ml:hover { background: #2369d4; }

/* ── LOADING / EMPTY ── */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 14px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading p { font-weight: 700; font-size: 14px; }
.loading small { font-size: 12px; color: #bbb; }

.empty {
  text-align: center;
  padding: 60px 20px;
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty p { font-weight: 700; color: var(--muted); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink);
  color: var(--yellow);
  padding: 12px 24px;
  border-radius: 30px;
  font-weight: 800;
  font-size: 13px;
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  z-index: 999;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── FILTER BAR ── */
.filter-bar {
  padding: 10px 16px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.filter-label { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

.filter-btn {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn.active {
  background: var(--ink);
  color: var(--yellow);
  border-color: var(--ink);
}
</style>
</head>
<body>

<header>
  <div class="logo-box">ML</div>
  <div>
    <h1>Ofertas Afiliado</h1>
    <p>Canal WhatsApp · México</p>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <span class="live-label">En vivo</span>
  </div>
</header>

<!-- Categorías -->
<div class="cats">
  <button class="cat active" onclick="selectCat(this,'smartphones baratos oferta')">📱 Celulares</button>
  <button class="cat" onclick="selectCat(this,'audifonos auriculares oferta')">🎧 Audífonos</button>
  <button class="cat" onclick="selectCat(this,'licuadora electrodomesticos oferta')">🏠 Hogar</button>
  <button class="cat" onclick="selectCat(this,'crema facial cuidado piel oferta')">💄 Belleza</button>
  <button class="cat" onclick="selectCat(this,'creatina proteina suplementos oferta')">💪 Deportes</button>
  <button class="cat" onclick="selectCat(this,'laptop computadora oferta')">💻 Laptops</button>
  <button class="cat" onclick="selectCat(this,'juguetes niños oferta')">🧸 Juguetes</button>
  <button class="cat" onclick="selectCat(this,'ropa tenis zapatos oferta')">👟 Moda</button>
  <button class="cat" onclick="selectCat(this,'herramientas ferreteria oferta')">🔧 Herramientas</button>
</div>

<!-- Búsqueda -->
<div class="search-wrap">
  <input id="q" type="text" placeholder="Buscar producto específico..." onkeydown="if(event.key==='Enter')doSearch()"/>
  <button class="btn-search" onclick="doSearch()" id="btnSearch">🔍 Buscar</button>
</div>

<!-- Filtros -->
<div class="filter-bar">
  <span class="filter-label">Descuento mínimo:</span>
  <button class="filter-btn active" onclick="setDiscount(10,this)">10%+</button>
  <button class="filter-btn" onclick="setDiscount(20,this)">20%+</button>
  <button class="filter-btn" onclick="setDiscount(30,this)">30%+</button>
  <button class="filter-btn" onclick="setDiscount(40,this)">40%+</button>
</div>

<!-- Status -->
<div class="status" id="status">
  <span id="statusTxt">Selecciona una categoría para ver ofertas</span>
</div>

<!-- Resultados -->
<div class="grid" id="grid">
  <div class="empty">
    <div class="empty-icon">🛍️</div>
    <p>Los mejores productos con oferta aparecerán aquí</p>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let minDiscount = 10;
let lastQuery = 'smartphones baratos oferta';

function selectCat(el, query) {
  document.querySelectorAll('.cat').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('q').value = '';
  lastQuery = query;
  fetchDeals(query);
}

function setDiscount(pct, el) {
  minDiscount = pct;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  fetchDeals(lastQuery);
}

function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  lastQuery = q;
  document.querySelectorAll('.cat').forEach(b => b.classList.remove('active'));
  fetchDeals(q);
}

async function fetchDeals(query) {
  const grid = document.getElementById('grid');
  const btn = document.getElementById('btnSearch');
  const statusTxt = document.getElementById('statusTxt');

  grid.innerHTML = `<div class="loading"><div class="spinner"></div><p>Buscando ofertas...</p><small>Consultando Mercado Libre México</small></div>`;
  btn.disabled = true;
  statusTxt.textContent = 'Buscando...';

  try {
    // Use promotions filter to guarantee discounted items
    const url = `https://api.mercadolibre.com/sites/MLM/search?q=${encodeURIComponent(query)}&promotions=DEAL_OF_THE_DAY,BEST_PRICE,LIGHTNING_DEAL,SPECIAL_PRICE&limit=50&sort=relevance`;
    const res = await fetch(url);
    const data = await res.json();

    let all = data.results || [];

    // If promotions filter returned nothing, try plain search with discount_percentage
    if (all.length === 0) {
      const res2 = await fetch(`https://api.mercadolibre.com/sites/MLM/search?q=${encodeURIComponent(query)}&limit=50&sort=relevance`);
      const data2 = await res2.json();
      all = data2.results || [];
    }

    // Normalize discount for each item
    all = all.map(item => {
      let pct = 0;
      if (item.original_price && item.original_price > item.price) {
        pct = Math.round((1 - item.price / item.original_price) * 100);
      }
      // Also check sale_price tags
      if (pct === 0 && item.tags && item.tags.includes('good_quality_picture')) {
        // no discount signal
      }
      item._discount = pct;
      if (!item.original_price) item.original_price = null;
      return item;
    });

    // Filter by selected minDiscount — only items WITH a real discount
    let items = all.filter(i => i._discount >= minDiscount);

    if (items.length === 0) {
      // Fallback 1: any discount >= 5%
      items = all.filter(i => i._discount >= 5);
    }

    if (items.length === 0) {
      // Fallback 2: items that at least have original_price field (ML marked them on sale)
      items = all.filter(i => i.original_price);
    }

    if (items.length === 0) {
      // Last resort: show everything sorted by sold quantity (trending)
      items = all.slice(0, 15);
      statusTxt.textContent = `${items.length} productos en tendencia (sin descuento visible en API)`;
    } else {
      statusTxt.textContent = `${items.length} productos con descuento encontrados`;
    }

    // Sort best discount first, then by sold_quantity
    items.sort((a, b) => {
      if (b._discount !== a._discount) return b._discount - a._discount;
      return (b.sold_quantity || 0) - (a.sold_quantity || 0);
    });
    items = items.slice(0, 15);

    renderCards(items);
  } catch(e) {
    console.error(e);
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Error de conexión. Intenta de nuevo.</p></div>`;
    statusTxt.textContent = 'Error';
  }

  btn.disabled = false;
}

function fmtPrice(n) {
  return '$' + Math.round(n).toLocaleString('es-MX');
}

function buildMsg(item, pct) {
  const title = item.title;
  const now = fmtPrice(item.price);
  const before = fmtPrice(item.original_price);
  const rating = item.seller?.seller_reputation?.transactions?.ratings?.positive
    ? (item.seller.seller_reputation.transactions.ratings.positive * 5).toFixed(1)
    : '4.5';

  // Generate a short benefit line based on title keywords
  function getBenefit(title) {
    const t = title.toLowerCase();
    if (t.includes('tenis') || t.includes('zapato') || t.includes('sneaker')) return '🔥 Diseño moderno con máxima comodidad';
    if (t.includes('audífono') || t.includes('auricular') || t.includes('airpod')) return '🔥 Sonido premium y conexión instantánea';
    if (t.includes('licuadora') || t.includes('batidora')) return '🔥 Potente, resistente y perfecta para el día a día';
    if (t.includes('crema') || t.includes('sérum') || t.includes('facial') || t.includes('piel')) return '🔥 Piel más limpia, hidratada y con mejor tono';
    if (t.includes('creatina') || t.includes('proteína') || t.includes('suplemento')) return '🔥 Ideal para ganar fuerza y aumentar masa muscular';
    if (t.includes('laptop') || t.includes('computadora') || t.includes('pc')) return '🔥 Alto rendimiento para trabajo y entretenimiento';
    if (t.includes('celular') || t.includes('smartphone') || t.includes('iphone') || t.includes('samsung')) return '🔥 Cámara potente, batería duradera y diseño premium';
    if (t.includes('silla') || t.includes('escritorio') || t.includes('mueble')) return '🔥 Comodidad y estilo para tu hogar u oficina';
    if (t.includes('reloj') || t.includes('smartwatch')) return '🔥 Estilo y tecnología en tu muñeca';
    if (t.includes('cafetera') || t.includes('café')) return '🔥 Tu café perfecto en casa todos los días';
    return '🔥 Gran calidad al mejor precio del momento';
  }

  // Generate closing line
  function getClosing(title) {
    const t = title.toLowerCase();
    if (t.includes('tenis') || t.includes('zapato')) return 'Perfectos para outfits casuales y uso diario';
    if (t.includes('audífono') || t.includes('auricular') || t.includes('airpod')) return 'Perfectos para música, llamadas y uso diario';
    if (t.includes('licuadora') || t.includes('batidora')) return 'Ideal para jugos, licuados y recetas rápidas';
    if (t.includes('crema') || t.includes('sérum') || t.includes('piel') || t.includes('facial')) return 'Perfecto para cuidar tu piel todos los días';
    if (t.includes('creatina') || t.includes('proteína')) return 'Ideal para tus entrenamientos y recuperación';
    if (t.includes('laptop') || t.includes('computadora')) return 'Ideal para trabajo, estudios y entretenimiento';
    if (t.includes('celular') || t.includes('smartphone') || t.includes('iphone') || t.includes('samsung')) return 'Ideal para comunicarte, trabajar y disfrutar';
    if (t.includes('reloj') || t.includes('smartwatch')) return 'Perfecto para lucir bien y mantenerte conectado';
    if (t.includes('cafetera')) return 'Ideal para empezar el día con el café que mereces';
    return 'No dejes pasar esta oferta por tiempo limitado';
  }

  const priceLine = item.original_price
    ? `💰 Antes: ${before}\n🔥 Ahora: ${now}`
    : `💰 Precio: ${now}`;

  return `${title}

${getBenefit(title)}

${priceLine}
⭐ ${rating} estrellas

${getClosing(title)}

👉 Cómpralo aquí: [TU LINK DE AFILIADO]`;
}

function renderCards(items) {
  const grid = document.getElementById('grid');

  if (!items.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">😕</div><p>No hay productos con ese % de descuento.<br>Intenta bajar el filtro.</p></div>`;
    return;
  }

  grid.innerHTML = '';

  items.forEach((item, i) => {
    const pct = item._discount || 0;
    const msg = buildMsg(item, pct);
    const msgId = 'msg' + i;
    const boxId = 'box' + i;
    const chevId = 'chev' + i;
    const thumb = (item.thumbnail || '').replace('http:', 'https:');

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i * 50) + 'ms';

    card.innerHTML = `
      <div class="card-body">
        <div class="thumb-wrap">
          <img class="thumb" src="${thumb}" alt="${item.title}"
            onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2288%22 height=%2288%22><rect fill=%22%23f0f0f0%22 width=%2288%22 height=%2288%22/><text x=%2244%22 y=%2252%22 text-anchor=%22middle%22 font-size=%2230%22>📦</text></svg>'"/>
          ${pct > 0 ? `<div class="badge-off">${pct}%</div>` : ''}
        </div>
        <div class="info">
          <div class="product-name">${item.title}</div>
          <div>
            <span class="price-now">${fmtPrice(item.price)}</span>
            ${item.original_price ? `<span class="price-before">${fmtPrice(item.original_price)}</span>` : ''}
          </div>
          <div class="meta">
            ${pct >= 30 ? '<span class="tag tag-hot">🔥 Super oferta</span>' : ''}
            ${item.sold_quantity ? `<span class="tag">+${item.sold_quantity} vendidos</span>` : ''}
            ${item.shipping?.free_shipping ? '<span class="tag">📦 Envío gratis</span>' : ''}
          </div>
        </div>
      </div>

      <div class="msg-section">
        <div class="msg-header" onclick="toggleMsg('${boxId}','${chevId}')">
          <div class="msg-header-left">
            <div class="wa-icon">💬</div>
            Mensaje para WhatsApp
          </div>
          <span class="chevron" id="${chevId}">▼</span>
        </div>
        <div class="msg-box" id="${boxId}">${msg}</div>
      </div>

      <div class="actions">
        <button class="btn btn-wa" id="${msgId}" onclick="copyMsg('${boxId}','${msgId}')">
          📋 Copiar mensaje
        </button>
        <button class="btn btn-ver" onclick="toggleMsg('${boxId}','${chevId}')">
          👁 Ver
        </button>
        <a class="btn btn-ml" href="${item.permalink || '#'}" target="_blank">
          🔗 ML
        </a>
      </div>
    `;

    grid.appendChild(card);
  });
}

function toggleMsg(boxId, chevId) {
  const box = document.getElementById(boxId);
  const chev = document.getElementById(chevId);
  box.classList.toggle('open');
  chev.classList.toggle('open');
}

function copyMsg(boxId, btnId) {
  const box = document.getElementById(boxId);
  // Make sure it's visible to get text
  const text = box.innerText || box.textContent;

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    btn.textContent = '✅ ¡Copiado!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '📋 Copiar mensaje';
      btn.classList.remove('copied');
    }, 2500);
    showToast('✅ Pegalo en WhatsApp y cambia el link 👆');
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ ¡Copiado! Pegalo en WhatsApp');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Load first category on start
fetchDeals(lastQuery);
</script>
